<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Login & Register | Validated Forms</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <!-- Hidden radio toggles for pure CSS switching (no JS needed for toggle) -->
      <input
        type="radio"
        name="formToggle"
        id="loginToggle"
        class="toggle-radio"
        checked
      />
      <input
        type="radio"
        name="formToggle"
        id="registerToggle"
        class="toggle-radio"
      />

      <div class="forms-container">
        <!-- ================= LOGIN FORM ================= -->
        <div class="form login-form">
          <h2>Login Form</h2>
          <form id="loginForm">
            <div class="input-group">
              <label>👤 Username</label>
              <input
                type="text"
                name="username"
                id="loginUsername"
                placeholder="Enter your username"
              />
            </div>
            <div class="input-group">
              <label>🔒 Password</label>
              <input
                type="password"
                name="password"
                id="loginPassword"
                placeholder="••••••••"
              />
            </div>
            <div id="loginError" class="error-msg"></div>
            <div class="button-group">
              <button type="submit" class="btn btn-primary">Login</button>
              <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
            <div class="toggle-link">
              <label for="registerToggle">Create New Account</label>
            </div>
          </form>
        </div>

        <!-- ================= REGISTRATION FORM ================= -->
        <div class="form register-form">
          <h2>Registration Form</h2>
          <form id="registerForm">
            <!-- First & Last Name row -->
            <div style="display: flex; gap: 1rem; flex-wrap: wrap">
              <div style="flex: 1">
                <div class="input-group">
                  <label>First Name</label>
                  <input
                    type="text"
                    name="firstName"
                    id="regFirstName"
                    placeholder="John"
                  />
                </div>
              </div>
              <div style="flex: 1">
                <div class="input-group">
                  <label>Last Name</label>
                  <input
                    type="text"
                    name="lastName"
                    id="regLastName"
                    placeholder="Doe"
                  />
                </div>
              </div>
            </div>

            <!-- Department dropdown -->
            <div class="input-group">
              <label>Department</label>
              <select name="department" id="regDepartment">
                <option value="cs" selected>Computer Science</option>
                <option value="it">Information Technology</option>
                <option value="ece">Electronics & Communication</option>
                <option value="mech">Mechanical Engineering</option>
              </select>
            </div>

            <!-- Gender radio buttons -->
            <div class="extra-margin">
              <span class="fieldset-title">Gender</span>
              <div class="radio-group" id="genderGroup">
                <label class="radio-option">
                  <input type="radio" name="gender" value="male" /> Male
                </label>
                <label class="radio-option">
                  <input type="radio" name="gender" value="female" /> Female
                </label>
                <label class="radio-option">
                  <input type="radio" name="gender" value="other" /> Other
                </label>
              </div>
            </div>

            <!-- Hobbies checkboxes -->
            <div class="extra-margin">
              <span class="fieldset-title">Hobbies</span>
              <div class="checkbox-group" id="hobbiesGroup">
                <label class="check-option">
                  <input type="checkbox" name="hobby" value="reading" /> Reading
                </label>
                <label class="check-option">
                  <input type="checkbox" name="hobby" value="sports" /> Sports
                </label>
                <label class="check-option">
                  <input type="checkbox" name="hobby" value="music" /> Music
                </label>
                <label class="check-option">
                  <input type="checkbox" name="hobby" value="travel" /> Travel
                </label>
              </div>
            </div>

            <div id="registerError" class="error-msg"></div>

            <div class="button-group">
              <button type="submit" class="btn btn-primary">Register</button>
              <button type="reset" class="btn btn-secondary">Clear</button>
            </div>

            <div class="toggle-link">
              <label for="loginToggle">Already have an account? Sign In</label>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
